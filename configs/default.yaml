# ClaimVerify - Default Configuration
# Scientific Claim Verification with RAG

data:
  dataset: "allenai/scifact"
  cache_dir: null  # defaults to HF cache
  corpus_split: "corpus"

retrieval:
  bm25:
    k1: 1.2
    b: 0.75
    top_k: 100

  dense:
    model: "BAAI/bge-m3"
    query_prefix: ""
    doc_prefix: ""
    batch_size: 64
    top_k: 100
    index_path: "data/processed/dense_index"

  fusion:
    method: "rrf"  # reciprocal rank fusion
    rrf_k: 60
    top_k: 50  # candidates passed to reranker

  reranker:
    enabled: true
    model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
    top_k: 10  # final top-k after reranking

reasoning:
  rationale:
    model: "sentence-transformers/all-MiniLM-L6-v2"
    max_sentences_per_doc: 3
    min_score: 0.25

  verdict:
    model: "MoritzLaurer/DeBERTa-v3-large-mnli-fever-anli-ling-wanli"

  aggregation:
    conflict_threshold: 0.3

generation:
  method: "extractive"  # "template", "extractive", or "llm"
  llm:
    model: "google/gemma-4-E4B"
    max_new_tokens: 256
    temperature: 0.3

calibration:
  threshold: 0.35
  conflict_override: true
  min_coverage: 0.5
  n_thresholds: 50

evaluation:
  ks: [5, 10, 20]  # k values for Recall@k, nDCG@k
  split: "dev"

output:
  results_dir: "results"
  index_dir: "data/processed"
