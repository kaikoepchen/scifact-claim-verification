<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 680" font-family="Inter, Segoe UI, system-ui, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="680" rx="12" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Title -->
  <text x="410" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#111">SciFact Claim Verification Pipeline</text>

  <!-- ===== INPUT ===== -->
  <rect x="310" y="52" width="200" height="40" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="410" y="77" text-anchor="middle" font-weight="600" fill="#1d4ed8">Scientific Claim</text>

  <!-- Arrow down -->
  <line x1="410" y1="92" x2="410" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== RETRIEVAL BLOCK ===== -->
  <rect x="60" y="120" width="700" height="145" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="80" y="140" font-size="11" font-weight="600" fill="#166534" letter-spacing="0.5">RETRIEVAL</text>

  <!-- BM25 -->
  <rect x="120" y="155" width="160" height="42" rx="7" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="200" y="180" text-anchor="middle" font-weight="500" fill="#333">BM25 (sparse)</text>

  <!-- Dense -->
  <rect x="540" y="155" width="160" height="42" rx="7" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="620" y="180" text-anchor="middle" font-weight="500" fill="#333">Dense (FAISS)</text>

  <!-- Arrows from claim to both -->
  <line x1="370" y1="120" x2="200" y2="155" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="450" y1="120" x2="620" y2="155" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Disagreement -->
  <rect x="310" y="152" width="200" height="36" rx="7" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="410" y="174" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">Disagreement Analysis</text>

  <!-- Arrows from retrievers to disagreement -->
  <line x1="280" y1="176" x2="310" y2="170" stroke="#f59e0b" stroke-width="1" marker-end="url(#arrow-orange)"/>
  <line x1="540" y1="176" x2="510" y2="170" stroke="#f59e0b" stroke-width="1" marker-end="url(#arrow-orange)"/>

  <!-- RRF Fusion -->
  <rect x="310" y="210" width="200" height="38" rx="7" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="410" y="234" text-anchor="middle" font-weight="500" fill="#333">RRF Fusion + Reranker</text>

  <!-- Arrows to fusion -->
  <line x1="200" y1="197" x2="350" y2="215" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="620" y1="197" x2="470" y2="215" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Arrow down from fusion -->
  <line x1="410" y1="248" x2="410" y2="290" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== REASONING BLOCK ===== -->
  <rect x="60" y="290" width="700" height="155" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="80" y="310" font-size="11" font-weight="600" fill="#1e40af" letter-spacing="0.5">REASONING</text>

  <!-- Rationale Selection -->
  <rect x="260" y="320" width="300" height="38" rx="7" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="410" y="343" text-anchor="middle" font-weight="500" fill="#333">Rationale Sentence Selection</text>

  <!-- NLI Verdict -->
  <rect x="260" y="375" width="300" height="38" rx="7" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="410" y="398" text-anchor="middle" font-weight="500" fill="#333">NLI Verdict (RoBERTa-MNLI)</text>

  <!-- Arrows -->
  <line x1="410" y1="358" x2="410" y2="375" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Verdict labels -->
  <rect x="600" y="375" width="130" height="38" rx="7" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="665" y="390" text-anchor="middle" font-size="11" fill="#166534">SUPPORT</text>
  <text x="665" y="405" text-anchor="middle" font-size="11" fill="#166534">CONTRADICT</text>

  <!-- Arrow to labels -->
  <line x1="560" y1="394" x2="600" y2="394" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Multi-Evidence Aggregation -->
  <rect x="260" y="425" width="300" height="38" rx="7" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="410" y="448" text-anchor="middle" font-weight="500" fill="#333">Multi-Evidence Aggregation</text>
  <line x1="410" y1="413" x2="410" y2="425" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Arrow down -->
  <line x1="410" y1="463" x2="410" y2="490" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== CALIBRATION BLOCK ===== -->
  <rect x="60" y="490" width="700" height="110" rx="10" fill="#fdf2f8" stroke="#f9a8d4" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="80" y="510" font-size="11" font-weight="600" fill="#9d174d" letter-spacing="0.5">CALIBRATION</text>

  <!-- Uncertainty Signals -->
  <rect x="140" y="520" width="220" height="38" rx="7" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="250" y="543" text-anchor="middle" font-weight="500" fill="#333">Uncertainty Signals</text>

  <!-- Abstention Gate -->
  <rect x="460" y="520" width="220" height="38" rx="7" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="570" y="543" text-anchor="middle" font-weight="500" fill="#333">Abstention Gate</text>

  <!-- Arrow from signals to gate -->
  <line x1="360" y1="539" x2="460" y2="539" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Disagreement signal arrow (from disagreement box down to uncertainty signals) -->
  <path d="M 410 188 L 410 200 L 80 200 L 80 539 L 140 539" fill="none" stroke="#f59e0b" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrow-orange)"/>
  <text x="72" y="370" font-size="10" fill="#92400e" transform="rotate(-90 72 370)" text-anchor="middle">disagreement signal</text>

  <!-- NLI confidence arrow to signals -->
  <path d="M 260 444 L 200 444 L 200 520" fill="none" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>
  <text x="175" y="480" font-size="10" fill="#1e40af">NLI conf.</text>

  <!-- Aggregation to gate area -->
  <line x1="410" y1="463" x2="410" y2="480" stroke="#555" stroke-width="1.2"/>
  <line x1="410" y1="480" x2="570" y2="520" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Arrow down from gate -->
  <line x1="570" y1="558" x2="570" y2="575" stroke="#555" stroke-width="1.2"/>

  <!-- ===== OUTPUT ===== -->
  <!-- Answer -->
  <rect x="430" y="610" width="120" height="40" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="490" y="634" text-anchor="middle" font-weight="600" fill="#166534">Answer</text>

  <!-- Abstain -->
  <rect x="580" y="610" width="120" height="40" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="640" y="634" text-anchor="middle" font-weight="600" fill="#854d0e">Abstain</text>

  <!-- Flag -->
  <rect x="280" y="610" width="120" height="40" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="340" y="634" text-anchor="middle" font-weight="600" fill="#991b1b">Flag Conflict</text>

  <!-- Arrows from gate to outputs -->
  <line x1="530" y1="575" x2="490" y2="610" stroke="#22c55e" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="610" y1="575" x2="640" y2="610" stroke="#eab308" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="505" y1="575" x2="380" y2="610" stroke="#ef4444" stroke-width="1.3" marker-end="url(#arrow)"/>
</svg>
